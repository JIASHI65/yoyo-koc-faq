<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社媒排期月历</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0e17; color: #e2e8f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

/* Header */
.header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left h1 { font-size: 24px; font-weight: 800; color: #f1f5f9; }
.header-left h1 span { color: #38bdf8; }
.header-left p { font-size: 13px; color: #475569; margin-top: 4px; }
.header-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* Month nav */
.month-nav {
  display: flex; align-items: center; gap: 16px;
  background: rgba(255,255,255,0.03); padding: 8px 16px;
  border-radius: 10px; border: 1px solid rgba(255,255,255,0.06);
}
.month-nav button {
  width: 32px; height: 32px; border-radius: 8px; border: none;
  background: rgba(255,255,255,0.06); color: #e2e8f0;
  font-size: 16px; cursor: pointer; transition: 0.15s;
}
.month-nav button:hover { background: rgba(56,189,248,0.2); }
.month-nav .month-label { font-size: 16px; font-weight: 700; color: #f1f5f9; min-width: 120px; text-align: center; }

/* Filters */
.filters { display: flex; gap: 6px; }
.filter-btn {
  padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03); color: #94a3b8; transition: 0.15s;
}
.filter-btn:hover { background: rgba(56,189,248,0.08); }
.filter-btn.active { background: rgba(56,189,248,0.12); color: #38bdf8; border-color: rgba(56,189,248,0.3); }

/* Calendar grid */
.cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.day-header {
  padding: 10px; text-align: center; font-size: 12px; font-weight: 600;
  color: #64748b; text-transform: uppercase; letter-spacing: 0.5px;
}

.day-cell {
  min-height: 120px; background: rgba(255,255,255,0.02);
  border-radius: 8px; padding: 6px; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.04); transition: 0.15s;
  position: relative;
}
.day-cell:hover { background: rgba(255,255,255,0.04); border-color: rgba(56,189,248,0.15); }
.day-cell.other-month { opacity: 0.3; }
.day-cell.today { border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.04); }

.day-number {
  font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 4px;
  padding: 2px 6px;
}
.day-cell.today .day-number { color: #38bdf8; }

/* Content cards in calendar */
.cal-card {
  padding: 4px 6px; border-radius: 4px; font-size: 11px;
  margin-bottom: 3px; cursor: pointer; transition: 0.1s;
  border-left: 3px solid; line-height: 1.3;
  position: relative;
}
.cal-card:hover { filter: brightness(1.2); }
.cal-card .acc { font-size: 10px; opacity: 0.8; }
.cal-card .tt { font-weight: 600; }
.cal-card.official { background: rgba(56,189,248,0.1); border-color: #38bdf8; }
.cal-card.undercover { background: rgba(168,85,247,0.1); border-color: #a855f7; }
.cal-card .plat { font-size: 9px; opacity: 0.6; margin-left: 2px; }

/* Legend */
.legend {
  display: flex; gap: 20px; margin: 16px 0; padding: 12px 16px;
  background: rgba(255,255,255,0.02); border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.04); align-items: center;
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #94a3b8; }
.legend-dot { width: 12px; height: 4px; border-radius: 2px; }
.legend-dot.blue { background: #38bdf8; }
.legend-dot.purple { background: #a855f7; }

/* Modal */
.modal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 100; align-items: center; justify-content: center;
}
.modal.show { display: flex; }
.modal-inner {
  background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 28px; max-width: 520px; width: 92%;
  max-height: 90vh; overflow-y: auto;
}
.modal-close { float: right; font-size: 20px; color: #64748b; cursor: pointer; background: none; border: none; }
.modal-close:hover { color: #e2e8f0; }
.modal h3 { font-size: 18px; color: #f1f5f9; margin-bottom: 16px; }

/* Form */
.form-row { margin-bottom: 12px; }
.form-row label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; font-weight: 500; }
.form-row input, .form-row select, .form-row textarea {
  width: 100%; padding: 10px 12px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04); color: #e2e8f0;
  font-size: 13px; outline: none;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #38bdf8; }
.form-row textarea { resize: vertical; min-height: 50px; }
.form-row .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.form-actions { display: flex; gap: 8px; margin-top: 16px; }
.btn {
  padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; transition: 0.15s; flex: 1;
}
.btn-primary { background: linear-gradient(135deg, #38bdf8, #6366f1); color: #fff; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-danger { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background: rgba(239,68,68,0.25); }

/* Account management */
.acc-mgr { padding: 16px; background: rgba(255,255,255,0.02); border-radius: 8px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.04); }
.acc-mgr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.acc-mgr-header span { font-size: 13px; font-weight: 600; color: #94a3b8; }
.acc-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600;
  margin: 2px 4px 2px 0;
}
.acc-tag.official { background: rgba(56,189,248,0.1); color: #7dd3fc; }
.acc-tag.undercover { background: rgba(168,85,247,0.1); color: #c084fc; }
.acc-tag .del { cursor: pointer; opacity: 0.5; margin-left: 2px; }
.acc-tag .del:hover { opacity: 1; }

/* Stats bar */
.stats {
  display: flex; gap: 16px; padding: 12px 16px;
  background: rgba(255,255,255,0.02); border-radius: 8px;
  margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.04);
}
.stat-item { font-size: 12px; color: #64748b; }
.stat-item strong { color: #e2e8f0; font-size: 14px; }

/* Responsive */
@media (max-width: 768px) {
  .cal { gap: 2px; }
  .day-cell { min-height: 80px; padding: 4px; }
  .cal-card { font-size: 10px; padding: 3px 4px; }
  .header { flex-direction: column; }
}
</style>
</head>
<body>

<div class="container">

<!-- Header -->
<div class="header">
  <div class="header-left">
    <h1>📅 <span>社媒</span>排期月历</h1>
    <p>官号 + 水下矩阵号 · 全月内容一目了然</p>
  </div>
  <div class="header-right">
    <div class="filters" id="filters">
      <button class="filter-btn active" onclick="setFilter('all')">全部</button>
      <button class="filter-btn" onclick="setFilter('official')">官号</button>
      <button class="filter-btn" onclick="setFilter('undercover')">水下号</button>
    </div>
    <div class="month-nav">
      <button onclick="prevMonth()">‹</button>
      <span class="month-label" id="monthLabel">2026年7月</span>
      <button onclick="nextMonth()">›</button>
    </div>
  </div>
</div>

<!-- Legend + Stats -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot blue"></div> 官号</div>
  <div class="legend-item"><div class="legend-dot purple"></div> 水下号</div>
  <div class="stat-item" id="statTotal"></div>
</div>

<!-- Account Manager -->
<div class="acc-mgr" id="accMgr">
  <div class="acc-mgr-header">
    <span>📋 账号管理</span>
    <button class="btn btn-primary" style="flex:none;padding:6px 14px;font-size:12px" onclick="addAccount()">+ 添加账号</button>
  </div>
  <div id="accList"></div>
</div>

<!-- Calendar -->
<div class="cal" id="calendar"></div>

</div>

<!-- Content Modal -->
<div class="modal" id="modal">
  <div class="modal-inner">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 id="modalTitle">📝 添加排期</h3>
    <div id="modalForm"></div>
  </div>
</div>

<script>
// ===== STATE =====
var STATE = {
  year: 2026,
  month: 6, // 0-indexed: 6 = July
  accounts: [],
  entries: [],
  filter: 'all',
  editIdx: -1
};

// ===== LOAD / SAVE =====
function loadState() {
  try {
    var s = localStorage.getItem('social_calendar');
    if (s) {
      var d = JSON.parse(s);
      STATE.accounts = d.accounts || [];
      STATE.entries = d.entries || [];
    }
  } catch(e) {}
}
function saveState() {
  try {
    localStorage.setItem('social_calendar', JSON.stringify({
      accounts: STATE.accounts,
      entries: STATE.entries
    }));
  } catch(e) {}
}

// ===== ACCOUNTS =====
var DEFAULT_ACCOUNTS = [
  {name:"FB官号", type:"official"},
  {name:"IG官号", type:"official"},
  {name:"TikTok官号", type:"official"},
  {name:"水下号1", type:"undercover"},
  {name:"水下号2", type:"undercover"},
];

function initAccounts() {
  if (STATE.accounts.length === 0) {
    STATE.accounts = JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));
    saveState();
  }
}

function renderAccounts() {
  var list = document.getElementById('accList');
  if (STATE.accounts.length === 0) {
    list.innerHTML = '<span style="font-size:12px;color:#475569">还没有添加账号，点"+ 添加账号"开始</span>';
    return;
  }
  list.innerHTML = STATE.accounts.map(function(a, i) {
    var cls = a.type === 'official' ? 'official' : 'undercover';
    return '<span class="acc-tag ' + cls + '">' + a.name + ' <span class="del" onclick="deleteAccount(' + i + ')">✕</span></span>';
  }).join('');
}

function addAccount() {
  var name = prompt('账号名称（如：FB官号、水下号3）');
  if (!name || !name.trim()) return;
  var type = confirm('点"确定"=官号，点"取消"=水下号') ? 'official' : 'undercover';
  STATE.accounts.push({name: name.trim(), type: type});
  renderAccounts();
  render();
  saveState();
}

function deleteAccount(idx) {
  if (!confirm('删除「' + STATE.accounts[idx].name + '」？已有排期也会被删除')) return;
  var name = STATE.accounts[idx].name;
  STATE.accounts.splice(idx, 1);
  STATE.entries = STATE.entries.filter(function(e) { return e.account !== name; });
  renderAccounts();
  render();
  saveState();
}

// ===== CALENDAR =====
var MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
var DAY_NAMES = ['周一','周二','周三','周四','周五','周六','周日'];
var TODAY = new Date();

function getDaysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }

function render() {
  var y = STATE.year, m = STATE.month;
  document.getElementById('monthLabel').textContent = y + '年' + MONTHS[m];

  var daysInMonth = getDaysInMonth(y, m);
  // First day of month: 0=Sun, 1=Mon, ... 6=Sat
  var firstDay = new Date(y, m, 1).getDay();
  // We want Mon=0, so subtract 1, with Sunday becoming 6
  var startOffset = firstDay === 0 ? 6 : firstDay - 1;

  var html = '';
  // Day headers
  for (var i = 0; i < 7; i++) {
    html += '<div class="day-header">' + DAY_NAMES[i] + '</div>';
  }

  var totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;

  for (var i = 0; i < totalCells; i++) {
    var dayNum = i - startOffset + 1;
    var isCurrentMonth = dayNum >= 1 && dayNum <= daysInMonth;
    var dateStr = isCurrentMonth ? y + '-' + pad(m + 1) + '-' + pad(dayNum) : '';
    var isToday = isCurrentMonth && y === TODAY.getFullYear() && m === TODAY.getMonth() && dayNum === TODAY.getDate();

    if (isCurrentMonth) {
      var dayEntries = STATE.entries.filter(function(e) { return e.date === dateStr; });
      if (STATE.filter !== 'all') {
        var filterType = STATE.filter;
        dayEntries = dayEntries.filter(function(e) {
          var acc = STATE.accounts.find(function(a) { return a.name === e.account; });
          return acc && acc.type === filterType;
        });
      }

      html += '<div class="day-cell' + (isToday ? ' today' : '') + '" onclick="openAdd(\'' + dateStr + '\')">';
      html += '<div class="day-number">' + dayNum + '</div>';
      dayEntries.sort(function(a,b){ return (a.time||'00:00').localeCompare(b.time||'00:00'); });
      dayEntries.forEach(function(e, idx) {
        var acc = STATE.accounts.find(function(a) { return a.name === e.account; });
        var cls = acc && acc.type === 'official' ? 'official' : 'undercover';
        var globalIdx = STATE.entries.indexOf(e);
        html += '<div class="cal-card ' + cls + '" onclick="event.stopPropagation();openEdit(' + globalIdx + ')">';
        html += '<div><span class="acc">' + (e.account||'') + '</span><span class="plat">' + (e.platform||'') + '</span></div>';
        html += '<div class="tt">' + (e.title||'').substring(0, 14) + '</div>';
        html += '</div>';
      });
      html += '</div>';
    } else {
      html += '<div class="day-cell other-month"><div class="day-number"></div></div>';
    }
  }

  document.getElementById('calendar').innerHTML = html;
  document.getElementById('statTotal').innerHTML = '本月共 <strong>' + STATE.entries.length + '</strong> 条排期';
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function prevMonth() {
  STATE.month--;
  if (STATE.month < 0) { STATE.month = 11; STATE.year--; }
  render();
}
function nextMonth() {
  STATE.month++;
  if (STATE.month > 11) { STATE.month = 0; STATE.year++; }
  render();
}
function setFilter(f) {
  STATE.filter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.filter-btn')[f === 'all' ? 0 : f === 'official' ? 1 : 2].classList.add('active');
  render();
}

// ===== MODAL =====
function openAdd(dateStr) {
  STATE.editIdx = -1;
  document.getElementById('modalTitle').textContent = '📝 添加排期 — ' + dateStr;
  showForm(dateStr, {account:'',platform:'',format:'',time:'10:00',title:'',desc:'',status:'已排期'});
  document.getElementById('modal').classList.add('show');
}

function openEdit(idx) {
  STATE.editIdx = idx;
  var e = STATE.entries[idx];
  if (!e) return;
  document.getElementById('modalTitle').textContent = '✏️ 编辑排期';
  showForm(e.date, e);
  document.getElementById('modal').classList.add('show');
}

function showForm(date, data) {
  var accOpts = STATE.accounts.map(function(a) {
    var sel = a.name === data.account ? ' selected' : '';
    return '<option value="' + a.name + '"' + sel + '>' + a.name + '</option>';
  }).join('');

  var platOpts = ['Facebook','Instagram','TikTok'].map(function(p) {
    var sel = p === data.platform ? ' selected' : '';
    return '<option value="' + p + '"' + sel + '>' + p + '</option>';
  }).join('');

  var fmtOpts = ['图文','Reels','视频','直播'].map(function(f) {
    var sel = f === data.format ? ' selected' : '';
    return '<option value="' + f + '"' + sel + '>' + f + '</option>';
  }).join('');

  var statusOpts = ['已排期','已发布','待审核','草稿'].map(function(s) {
    var sel = s === data.status ? ' selected' : '';
    return '<option value="' + s + '"' + sel + '>' + s + '</option>';
  }).join('');

  var html = '<input type="hidden" id="f-date" value="' + date + '">';
  html += '<div class="form-row"><div class="row2">';
  html += '<div><label>账号</label><select id="f-account">' + accOpts + '</select></div>';
  html += '<div><label>状态</label><select id="f-status">' + statusOpts + '</select></div>';
  html += '</div></div>';
  html += '<div class="form-row"><div class="row2">';
  html += '<div><label>平台</label><select id="f-platform">' + platOpts + '</select></div>';
  html += '<div><label>形式</label><select id="f-format">' + fmtOpts + '</select></div>';
  html += '</div></div>';
  html += '<div class="form-row"><div class="row2">';
  html += '<div><label>时间</label><input type="time" id="f-time" value="' + (data.time||'10:00') + '"></div>';
  html += '<div><label>内容标题</label><input type="text" id="f-title" value="' + (data.title||'') + '" placeholder="如：半周年预告"></div>';
  html += '</div></div>';
  html += '<div class="form-row"><label>文案要点 / 备注</label><textarea id="f-desc" placeholder="发什么内容、话术、链接...">' + (data.desc||'') + '</textarea></div>';

  html += '<div class="form-actions">';
  html += '<button class="btn btn-primary" onclick="saveEntry()">💾 保存</button>';
  if (STATE.editIdx >= 0) {
    html += '<button class="btn btn-danger" onclick="deleteEntry()">🗑️ 删除</button>';
  }
  html += '<button class="btn" style="background:rgba(255,255,255,0.06);color:#94a3b8" onclick="closeModal()">取消</button>';
  html += '</div>';

  document.getElementById('modalForm').innerHTML = html;
}

function saveEntry() {
  var entry = {
    date: document.getElementById('f-date').value,
    account: document.getElementById('f-account').value,
    platform: document.getElementById('f-platform').value,
    format: document.getElementById('f-format').value,
    time: document.getElementById('f-time').value,
    title: document.getElementById('f-title').value.trim(),
    desc: document.getElementById('f-desc').value.trim(),
    status: document.getElementById('f-status').value
  };
  if (!entry.title) { alert('请输入内容标题'); return; }

  if (STATE.editIdx >= 0) {
    STATE.entries[STATE.editIdx] = entry;
  } else {
    STATE.entries.push(entry);
  }
  saveState();
  closeModal();
  render();
}

function deleteEntry() {
  if (STATE.editIdx < 0) return;
  if (!confirm('删除这条排期？')) return;
  STATE.entries.splice(STATE.editIdx, 1);
  saveState();
  closeModal();
  render();
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

// ===== INIT =====
loadState();
initAccounts();
renderAccounts();
render();
</script>
</body>
</html>
